# ZlauDeR project config.
#
# This is the practical default seeded by /zlauder:enable. For the full annotated
# config surface, see zlauder.toml.example in the plugin or main repo.

[proxy]
# No static port here: each project gets a derived port, passed as --port.
bind = "127.0.0.1"
upstream_base_url = "https://api.anthropic.com"

[engine]
enabled = true
profile = "balanced"
score_threshold = 0.5
language = "en"
enabled_categories = ["secrets", "financial", "identity", "contact"]
default_operator = { kind = "token" }
fail_closed = true

[engine.ml]
enabled = false
model = "openai/privacy-filter"

[engine.reveal_marker]
enabled = true
prefix = "\u001b[97;44m"
suffix = "\u001b[0m"

[engine.entity_operators]
CREDIT_CARD = { kind = "mask", char = "*", from_end = 4 }

[engine.allow_list]
exact = ["Anthropic", "Claude", "127.0.0.1"]
exact_ci = ["localhost"]
patterns = ['^\d{4}$']
